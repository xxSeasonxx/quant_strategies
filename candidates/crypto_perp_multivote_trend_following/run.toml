strategy_path = "strategy.py"
strategy_id = "crypto_perp_multivote_trend_following"

[data]
kind = "crypto_perp_funding"
symbols = [
  "BTC-PERP",
  "ETH-PERP",
  "SOL-PERP",
]
start = "2024-01-01"
end = "2024-01-07"

[params]
symbols = [
  "BTC-PERP",
  "ETH-PERP",
  "SOL-PERP",
]
min_votes = 4
base_position_pct = 0.08
cooldown_bars = 2
decision_interval_minutes = 60
decision_lag_minutes = 1
max_hold_bars = 720
atr_stop_mult = 5.5
rsi_period = 8
bb_percentile_threshold = 85.0
momentum_long_hours = 12
momentum_short_hours = 6
vshort_threshold_mult = 0.5
vol_lookback_hours = 48
base_momentum_threshold = 0.012
target_volatility = 0.015
dynamic_threshold_floor = 0.006
dynamic_threshold_ceiling = 0.025
ema_fast_span = 12
ema_slow_span = 26
macd_fast_span = 12
macd_slow_span = 26
macd_signal_span = 9
atr_period = 24
bb_window_hours = 10
bb_percentile_window_hours = 20

[fill_model]
price = "close"
entry_lag_bars = 1
exit_lag_bars = 0

[cost_model]
fee_bps_per_side = 5.0
slippage_bps_per_side = 1.0

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 1440
adv_min_observations = 60
max_bar_participation = 0.50
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[envelope]
operator_frozen = true

[output]
results_dir = "results"
quick_checks = true
artifact_profile = "diagnostic"
diagnostic_sample_trades = 5
causality_check = "micro"
