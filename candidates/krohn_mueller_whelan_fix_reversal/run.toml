strategy_path = "strategy.py"
strategy_id = "krohn_mueller_whelan_fix_reversal"

[data]
kind = "forex_with_quotes"
symbols = [
  "AUDUSD",
  "EURUSD",
  "GBPUSD",
  "NZDUSD",
  "USDCAD",
  "USDCHF",
  "USDJPY",
]
start = "2024-01-08"
end = "2024-01-08"

[params]
decision_lead_minutes = 2
observation_lag_minutes = 1
weight = 0.25
max_hold_bars = 2

[fill_model]
price = "quote"
entry_lag_bars = 1

[cost_model]
fee_bps_per_side = 0.5
slippage_bps_per_side = 0.5

# FX quote runs are diagnostic only: mode = "off" makes traded books fail
# closed with capacity_unpriced. FX ADV impact remains unsupported until
# calibrated notional liquidity exists.
[capacity_model]
mode = "off"

[risk_budget]
mode = "calibrate_vol"
annualization_periods_per_year = 525949
target_volatility = 0.10

[envelope]
operator_frozen = true

[output]
results_dir = "results"
quick_checks = true
artifact_profile = "diagnostic"
diagnostic_sample_trades = 5
causality_check = "micro"
