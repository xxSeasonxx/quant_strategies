strategy_path = "strategy.py"
strategy_id = "crypto_perp_funding_crowding_reversal"

[data]
kind = "crypto_perp_funding"
symbols = [
  "BTC-PERP",
  "ETH-PERP",
  "SOL-PERP",
  "XRP-PERP",
  "BNB-PERP",
  "DOGE-PERP",
  "ADA-PERP",
  "AVAX-PERP",
]
start = "2024-01-01"
end = "2024-01-07"

[params]
funding_lookback_events = 3
return_lookback_minutes = 240
decision_interval_minutes = 480
decision_lag_minutes = 1
top_n = 1
min_cross_section = 4
min_abs_funding_bps = 1.0
min_abs_return_bps = 25.0
weight = 0.25
max_hold_bars = 480

[fill_model]
price = "close"
entry_lag_bars = 1

[cost_model]
fee_bps_per_side = 5.0
slippage_bps_per_side = 1.0

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 1440
adv_min_observations = 60
max_bar_participation = 0.50
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[envelope]
operator_frozen = true

[output]
results_dir = "results"
quick_checks = true
artifact_profile = "diagnostic"
diagnostic_sample_trades = 5
causality_check = "micro"
