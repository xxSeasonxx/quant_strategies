strategy_path = "untested/fx_session_activity_profile_rejection.py"
strategy_id = "fx_session_activity_profile_rejection"

[data]
kind = "forex_with_quotes"
symbols = [
  "EURUSD",
  "USDJPY",
  "GBPUSD",
  "AUDUSD",
  "USDCAD",
]
start = "2024-01-07"
end = "2024-01-12"
load_start = "2024-01-07"
load_end = "2024-01-12"

[params]
profile_bin_count = 40
value_area_fraction = 0.70
min_profile_bars = 360
min_activity_observations = 20
activity_window_bars = 120
min_activity_z = 1.0
max_spread_percentile = 0.70
acceptance_confirm_bars = 2
rejection_lookback_bars = 60
decision_lag_minutes = 1
enable_acceptance = true
enable_rejection = true
use_lvn_boundaries = true
weight = 0.25
max_hold_bars = 180

[fill_model]
price = "quote"
entry_lag_bars = 1
exit_lag_bars = 0

[cost_model]
fee_bps_per_side = 0.0
slippage_bps_per_side = 0.0

[output]
results_dir = "results"
artifact_profile = "diagnostic"
diagnostic_sample_trades = 5
causality_check = "micro"
