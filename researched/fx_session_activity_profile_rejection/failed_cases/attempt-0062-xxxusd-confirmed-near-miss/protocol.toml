# Operator-owned Train-loop protocol.
#
# This file is the source of truth for HOW a thesis is run and judged on Train.
# The agent reads these values but does not change them during a thesis run.
#
# Where these settings come from:
# - symbols / dates / data kind: Season chooses them from quant_data readiness and
#   the thesis's intended market. They define the Train-only sample handed to the
#   loop. OOS windows are deliberately absent.
# - costs / fills: Season chooses realistic execution assumptions for the market.
#   Strategy params cannot zero costs or change fill timing.
# - objective / gates / loop constants: Season chooses the robustness target,
#   minimum evidence bars, and stopping behavior before the thesis starts. The
#   agent optimizes only strategy.py and bounded params against this frozen setup.
#
# Recommendation:
# - Active default below is the normal thesis-development setup: 2 years of Train,
#   6 robustness subwindows, and a 120-trade floor.
# - For a quick local smoke run, temporarily use 2025-01-01 -> 2025-01-14,
#   subwindows = 2, and min_trades = 4.
# - For a heavier overnight run, use 2023-01-01 -> 2025-12-31 if runtime is
#   acceptable. Keep 2026+ reserved for downstream OOS while local data ends near
#   2026-04-13.
# - Change plateau_patience / max_iterations only to control research budget:
#   smaller for fast checks, larger for overnight runs. Do not change them after
#   seeing a thesis's result.

# The pure strategy file and strategy id passed through to quant_strategies.
strategy_path = "strategy.py"
strategy_id = "fx_session_activity_profile_rejection"

[data]
# Public quant_strategies data loader kind. This is protocol-owned because data
# source choice changes what information the strategy can see.
kind = "forex_with_quotes"
# Fixed Train universe. The agent must not cherry-pick symbols in params.
#
# Symbol universe rationale:
# - EURUSD, USDJPY, GBPUSD, AUDUSD, and USDCAD are liquid G10 FX pairs with
#   research-ready quoted minute bars in the local derived FX dataset.
# - The five-symbol snapshot is explicit protocol state; later evidence is about
#   this strategy-universe combination, not pure strategy improvement.
symbols = ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD", "USDCAD"]
# Train-only date range. Date-only end is interpreted like the upstream loader:
# the loop includes the full end date by using a half-open [start, end + 1 day)
# objective window.
#
# Train window rationale:
# - 2025-03-01 through 2025-12-31 is Season's current Train window for this
#   migrated FX thesis and stays inside the quoted FX readiness window.
#
# Smoke/debug alternative:
# start = "2025-01-01"
# end = "2025-01-14"
#
# Heavier overnight alternative:
# start = "2023-01-01"
# end = "2025-12-31"
start = "2025-03-01"
end = "2025-12-31"
# Execution-only buffer used by the runner to resolve exits for late Train
# decisions. Strategy generation and Train scoring still use start/end above.
load_end = "2026-01-07"

[fill_model]
# Fill price used by quant_strategies. Quoted FX bars use executable bid/ask
# fields instead of close-only bar fills.
price = "quote"
# Entry lag of 1 means a signal emitted after a bar is available fills on the
# next bar, not the signal bar. This protects close-derived signals from lookahead.
entry_lag_bars = 1
# Exit lag is kept at 0 so max_hold exits occur at the configured hold boundary.
exit_lag_bars = 0

[cost_model]
# Quote fills already pay the bid/ask spread. No additional per-side fee or
# slippage bump is applied in the source FX baseline.
fee_bps_per_side = 0.0
slippage_bps_per_side = 0.0

[output]
# Must stay under results/ because quant_strategies rejects non-generated output
# directories.
results_dir = "results"
# diagnostic gives diagnostics.json with economic slices and sampled trades,
# which is more useful for the agent's next edit than summary-only output.
artifact_profile = "diagnostic"
# Let quant_strategies run its lightweight quick checks.
quick_checks = true
# Train iteration uses focused replay: deterministic full replay plus a bounded,
# deterministic mix of emitted and suppression probes. Full emitted/strict replay
# is for survivor audits because exhaustive replay is too expensive for the
# large minute panel.
causality_check = "off"
focused_probe_limit = 10
focused_timeout_seconds = 180.0
# Number of sample trades emitted in diagnostics. Must be >= 1 by runner schema.
diagnostic_sample_trades = 5

[loop]
# M: stop after this many consecutive completed non-improving attempts once a
# feasible baseline exists.
plateau_patience = 50
# N: hard cap on completed attempts for this thesis.
max_iterations = 100
# eps: absolute score improvement required to reset plateau patience.
min_abs_improvement = 0.001
# rho: relative score improvement required. 0 disables the relative component;
# the effective threshold is max(eps, rho * max(1, abs(best_score))).
min_rel_improvement = 0.0
# Initial attempts allowed to find any feasible baseline before the thesis dies
# on Train.
baseline_grace_iterations = 50

[objective]
# Robustness target selected before the thesis starts. The agent cannot pick a
# friendlier objective after seeing results.
kind = "worst_subwindow"
# K: number of contiguous Train time slices for worst_subwindow. Six slices over
# two years gives roughly quarterly robustness checks.
# Subwindow rationale: K=6 is enough to reject idle or one-regime Train survivors
# while keeping per-slice trade floors attainable for simple short-horizon ideas.
# Smoke/debug alternative: subwindows = 2
subwindows = 6

[gates]
# Minimum completed trades required before the score can be considered alive.
# Smoke/debug alternative: min_trades = 4
min_trades = 120
# Minimum completed trades required in every configured objective subwindow.
# This prevents idle Train slices from counting as robustness evidence.
# Smoke/debug alternative: min_trades_per_subwindow = 1
min_trades_per_subwindow = 10
# Maximum share of absolute net trade activity carried by one symbol. Lower is
# stricter diversification; 0.80 is permissive for a two-symbol smoke protocol.
max_symbol_concentration = 0.70
# Minimum stressed objective score after applying the extra cost bump.
min_cost_stress_score = 0.0
# Simplicity cap: maximum declared signal components in rationale.md.
max_components = 3
# Simplicity cap: maximum strategy params in experiment.toml [params].
max_params = 50
# Minimum base Train score required to pass the Train floor gate.
train_score_floor = 0.0
