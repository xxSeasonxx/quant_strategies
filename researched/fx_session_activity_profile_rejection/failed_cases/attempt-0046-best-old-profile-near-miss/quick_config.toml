strategy_path = "strategy.py"
strategy_id = "fx_session_activity_profile_rejection"

[data]
kind = "forex_with_quotes"
symbols = ["EURUSD", "USDJPY", "GBPUSD", "AUDUSD", "USDCAD"]
start = "2025-03-01"
end = "2025-12-31"
load_end = "2026-01-07"

[params]
profile_bin_count = 40
value_area_fraction = 0.7
min_profile_bars = 360
min_activity_observations = 20
activity_window_bars = 120
min_activity_z = 0.5
max_spread_percentile = 0.7
acceptance_confirm_bars = 2
rejection_lookback_bars = 60
decision_lag_minutes = 1
enable_acceptance = false
enable_rejection = true
use_lvn_boundaries = true
invert_directions = false
weight = 0.25
max_hold_bars = 180

[fill_model]
price = "quote"
entry_lag_bars = 1
exit_lag_bars = 0

[cost_model]
fee_bps_per_side = 0.0
slippage_bps_per_side = 0.0

[output]
results_dir = "results/autoresearch/attempt-0046"
artifact_profile = "diagnostic"
quick_checks = true
diagnostic_sample_trades = 5
causality_check = "off"
focused_probe_limit = 10
focused_timeout_seconds = 180.0
