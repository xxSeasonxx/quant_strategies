strategy_path = "strategy.py"
strategy_id = "crypto_perp_funding_crowding_reversal"

[data]
kind = "crypto_perp_funding"
symbols = ["BTC-PERP", "ETH-PERP", "SOL-PERP", "XRP-PERP", "BNB-PERP", "DOGE-PERP", "ADA-PERP", "LINK-PERP"]
start = "2025-03-01"
end = "2025-12-31"
dataset = "crypto_perp_1min_with_funding"
load_start = "2025-03-01"
load_end = "2026-01-07"

[params]
funding_lookback_events = 5
funding_decay = 0.0
return_lookback_minutes = 120
decision_interval_minutes = 240
entry_twap_bars = 20
exit_twap_bars = 30
decision_lag_minutes = 1
session_start_hour = 0
session_end_hour = 24
top_n = 5
min_cross_section = 4
min_abs_funding_bps = 1.0
min_abs_return_bps = 0.0
include_positive_funding_shorts = false
include_negative_funding_longs = true
min_same_sign_funding_events = 1
min_latest_abs_funding_bps = 0.0
recent_return_lookback_minutes = 60
max_recent_same_direction_return_bps = 1000.0
min_idiosyncratic_return_bps = 2.5
idiosyncratic_mode = "raw"
min_idiosyncratic_sigma = 0.5
selection_score = "combined"
cross_section_reference = "mean"
weighting = "combined"
dislocation_weight_power = 4.0
vol_lookback_minutes = 1440
long_hold_minutes = 720
short_hold_minutes = 720
hold_vol_scaling = 0.0
hold_dislocation_scaling = 0.0
take_profit_frac = 0.0

[fill_model]
price = "close"
entry_lag_bars = 1

[cost_model]
fee_bps_per_side = 5.0
slippage_bps_per_side = 1.0

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 1440
adv_min_observations = 60
max_bar_participation = 0.5
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[leverage_budget]
max_gross_exposure = 1.0
max_net_exposure = 1.0

[risk_budget]
mode = "calibrate_vol"
annualization_periods_per_year = 525600
target_volatility = 0.15

[envelope]
operator_frozen = true

[output]
results_dir = "results/autoresearch/attempt-0014"
artifact_profile = "diagnostic"
quick_checks = true
diagnostic_sample_trades = 5
causality_check = "micro"
foundation_subwindows = 6
foundation_cost_stress_multiplier = 2.0
micro_probe_limit = 40
micro_timeout_seconds = 600.0
