# Operator-owned Train-loop protocol.
#
# This root file may contain either a scaffold or an active local thesis. Use
# `python -m loop status` for lifecycle state. During an active thesis, these
# protocol-owned values are frozen unless Season starts a new lifecycle.

strategy_path = "strategy.py"
strategy_id = "crypto_perp_funding_crowding_reversal"

[data]
kind = "crypto_perp_funding"
dataset = "crypto_perp_1min_with_funding"
symbols = ["BTC-PERP", "ETH-PERP", "SOL-PERP", "XRP-PERP", "BNB-PERP", "DOGE-PERP", "ADA-PERP", "LINK-PERP"]
start = "2025-03-01"
end = "2025-12-31"
load_start = "2025-03-01"
load_end = "2026-01-07"

[fill_model]
price = "close"
entry_lag_bars = 1

[cost_model]
fee_bps_per_side = 5.0
slippage_bps_per_side = 1.0

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 1440
adv_min_observations = 60
max_bar_participation = 0.50
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[leverage_budget]
max_gross_exposure = 1.0
max_net_exposure = 1.0

[risk_budget]
mode = "calibrate_vol"
annualization_periods_per_year = 525600
target_volatility = 0.15

[output]
results_dir = "results"
artifact_profile = "diagnostic"
quick_checks = true
causality_check = "micro"
micro_probe_limit = 40
micro_timeout_seconds = 600.0
diagnostic_sample_trades = 5
foundation_subwindows = 6
foundation_cost_stress_multiplier = 2.0

[loop]
plateau_patience = 50
max_iterations = 50
min_abs_improvement = 0.001
min_rel_improvement = 0.0
baseline_grace_iterations = 50

[objective]
kind = "return_lcb_subwindow"
subwindows = 6
psr_hurdle_sharpe = 0.0

[gates]
min_trades = 120
min_return_sample_count = 100
min_effective_sample_size = 50.0
max_symbol_concentration = 0.70
min_cost_stress_return_retention = 0.50
max_abs_drawdown = 0.25
score_haircut_se = 2.0
max_components = 3
max_params = 50
