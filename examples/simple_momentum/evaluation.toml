strategy_path = "strategy.py"
strategy_id = "simple_momentum"

[[windows]]
id = "evaluation_2024_01"
start = "2024-01-01"
end = "2024-01-31"

[data]
kind = "bars"
dataset = "equity_1min"
symbols = ["SPY"]

[params]
weight = 1.0
max_hold_bars = 1

[fill_model]
price = "close"
entry_lag_bars = 1

[cost_model]
fee_bps_per_side = 1.0
slippage_bps_per_side = 0.5

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 390
adv_min_observations = 1
max_bar_participation = 0.50
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[risk_budget]
mode = "fixed_scale"
annualization_periods_per_year = 525949
book_scale = 1.0

[metrics]
annualization_periods_per_year = 525949
min_annualized_samples = 20

[output]
results_dir = "evaluation_results/simple_momentum"
