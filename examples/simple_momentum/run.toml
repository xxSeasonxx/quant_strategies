strategy_path = "strategy.py"
strategy_id = "simple_momentum"

[data]
kind = "bars"
dataset = "equity_1min"
symbols = ["SPY"]
start = "2024-01-01"
end = "2024-01-31"

[params]
weight = 1.0
max_hold_bars = 1

[fill_model]
price = "close"
entry_lag_bars = 1
exit_lag_bars = 0

[cost_model]
fee_bps_per_side = 1.0
slippage_bps_per_side = 0.5

[capacity_model]
mode = "adv_impact"
portfolio_notional = 1000000.0
adv_lookback_bars = 390
adv_min_observations = 1
max_bar_participation = 0.50
max_adv_participation = 0.25
impact_coefficient_bps = 10.0
impact_exponent = 0.5

[envelope]
operator_frozen = true

[output]
results_dir = "results"
quick_checks = true
artifact_profile = "diagnostic"
diagnostic_sample_trades = 5
causality_check = "micro"
